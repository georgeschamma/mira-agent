name: Build ACR image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_CORE_OUTPUT: none
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  IMAGE_NAME: mira-agent

jobs:
  build:
    name: Build and push linux/amd64 image
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image tag
        id: image
        shell: bash
        run: echo "tag=phase-3-${GITHUB_SHA::7}-amd64" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}

      - name: Get short-lived ACR access token
        id: acr-token
        shell: bash
        run: |
          token="$(az acr login --name "$ACR_NAME" --expose-token --output tsv --query accessToken)"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr-token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}

      - name: Record image
        shell: bash
        run: |
          echo "Image: $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ steps.image.outputs.tag }}" \
            >> "$GITHUB_STEP_SUMMARY"
